<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation | Rik de Bruijn</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* We maken de iframe iets groter dan het scherm om de laatste pixels van de interface buiten beeld te drukken */
        iframe { 
            width: 100vw; 
            height: 56.25vw; /* 16:9 verhouding */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 verhouding */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: none; 
        }
        
        .sound-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sound-tip">Click for audio</div>

    <div class="video-wrapper">
        <iframe 
            id="vimeo-player"
            src="https://player.vimeo.com/video/1175289690?autoplay=1&loop=1&muted=1&autopause=0&controls=0&background=1" 
            allow="autoplay; fullscreen" 
            frameborder="0">
        </iframe>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        var iframe = document.querySelector('#vimeo-player');
        var player = new Vimeo.Player(iframe);

        // Bij klik: unmute de video handmatig via de API
        document.body.addEventListener('click', function() {
            player.setMuted(false);
            player.setVolume(1);
            document.querySelector('.sound-tip').style.display = 'none';
        });
    </script>

</body>
</html>
