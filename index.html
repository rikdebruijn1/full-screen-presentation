<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation | Rik de Bruijn</title>
    <style>
        /* Basisinstellingen om het hele scherm te vullen zonder scrollbars */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; /* Zwarte achtergrond voor een bioscoop-effect */
        }

        /* De container die de video paginagroot maakt */
        .video-wrapper { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        /* De iframe instellingen voor een naadloze weergave */
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe 
            src="https://player.vimeo.com/video/1175289690?autoplay=1&loop=1&autopause=0&muted=1&background=1&quality=1080p#t=0s" 
            allow="autoplay; fullscreen" 
            muted 
            playsinline>
        </iframe>
    </div>

</body>
</html>
