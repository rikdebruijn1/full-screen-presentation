<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation | Rik de Bruijn</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* We schalen de video op naar 115% om de Vimeo-interface buiten het scherm te duwen */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 115vw; 
            height: 115vh;
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none; /* Zorgt dat men niet per ongeluk op de balk klikt */
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
        }

        .sound-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sound-tip">Click for audio</div>
    
    <div class="video-container">
        <div class="click-overlay"></div>
        
        <iframe 
            id="vimeo-player"
            src="https://player.vimeo.com/video/1175289690?autoplay=1&loop=1&muted=1&autopause=0&background=1" 
            allow="autoplay; fullscreen" 
            frameborder="0">
        </iframe>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        var iframe = document.querySelector('#vimeo-player');
        var player = new Vimeo.Player(iframe);
        var overlay = document.querySelector('.click-overlay');

        overlay.addEventListener('click', function() {
            player.setMuted(false);
            player.setVolume(1);
            document.querySelector('.sound-tip').style.display = 'none';
        });
    </script>

</body>
</html>
